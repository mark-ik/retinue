[package]
name = "retinue"
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mark-ik/retinue"
description = "An endpoint-scoped implementation of the Reticulum protocol: identity, announces, links, and resources for embedding, not routing. Early reservation; the protocol is public domain, and this is not the reference implementation (reticulum.network)."
keywords = ["reticulum", "mesh", "networking", "p2p", "off-grid"]
categories = ["network-programming"]

[features]
default = ["tokio"]
# The TCP interface needs a runtime. The wire codec and HDLC framing do not, and stay
# available with default-features = false.
tokio = ["dep:tokio"]

[dependencies]
aes = "0.9.1"
cbc = "0.2.1"
ed25519-dalek = "3.0.0"
hkdf = "0.13.0"
hmac = "0.13.0"
rand_core = "0.10.1"
sha2 = "0.11.0"
tokio = { version = "1", features = ["net", "io-util", "sync", "rt", "time", "macros"], optional = true }
x25519-dalek = { version = "3.0.0", features = ["static_secrets"] }

[dev-dependencies]
hex = "0.4.3"
tokio = { version = "1", features = ["net", "io-util", "rt-multi-thread", "macros", "time"] }
serde = "1.0.228"
serde_json = "1.0.150"
