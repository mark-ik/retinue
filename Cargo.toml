[package]
name = "retinue"
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mark-ik/retinue"
description = "A Rust implementation of the Reticulum protocol: identity, announces, links, resources, and routing. The protocol is public domain; this is not the reference implementation (reticulum.network)."
keywords = ["reticulum", "mesh", "networking", "p2p", "off-grid"]
categories = ["network-programming"]

[features]
default = ["tokio", "compression"]
# The TCP interface needs a runtime. The wire codec and HDLC framing do not, and stay
# available with default-features = false.
tokio = ["dep:tokio"]
# bz2 for resources. RNS compresses resource payloads by default, so full interop needs
# it; the pure-Rust libbz2-rs-sys backend keeps this a C-free dependency.
compression = ["dep:bzip2"]

[dependencies]
aes = "0.9.1"
bzip2 = { version = "0.6.1", optional = true }
cbc = "0.2.1"
ed25519-dalek = "3.0.0"
hkdf = "0.13.0"
hmac = "0.13.0"
rand_core = "0.10.1"
sha2 = "0.11.0"
tokio = { version = "1", features = ["net", "io-util", "sync", "rt", "time", "macros"], optional = true }
x25519-dalek = { version = "3.0.0", features = ["static_secrets"] }

[dev-dependencies]
hex = "0.4.3"
tokio = { version = "1", features = ["net", "io-util", "rt-multi-thread", "macros", "time"] }
serde = "1.0.228"
serde_json = "1.0.150"
