# cargo-deny configuration — the license gate.
#
# The load-bearing rule for retinue is that it and its whole dependency tree stay
# permissively licensed (MIT / Apache-2.0 and friends). A single copyleft dependency here
# would force any firmware that statically links retinue to become GPLv3, which is exactly
# the boundary the embedded strategy depends on keeping clean. See
# design_docs/2026-07-19_modem_embedded_and_meshtastic_research.md.
#
# This file drives `cargo deny check licenses` in CI: any license not on the allow list
# below — every GPL/LGPL/AGPL variant, MPL, etc. — fails the build, so the boundary cannot
# erode by accident (including through a transitive dependency).

[graph]
# Check optional dependencies too (tokio, getrandom, bzip2), so nothing hides behind a
# feature flag.
all-features = true

[licenses]
version = 2
# Exactly the permissive licenses currently in the tree — kept tight on purpose. A new
# dependency that introduces any other license fails this check, forcing a review:
#
#   * A permissive one (ISC, BSD-2-Clause, Zlib, ...) is a one-line, reviewed addition here.
#   * GPL/LGPL/AGPL is the hard red line: it is viral, so it would relicense any firmware
#     image that statically links retinue to (A)GPL. Never add it.
#   * MPL-2.0 is only *file-level* copyleft — it would NOT relicense the combined image, just
#     keep the MPL files themselves under MPL — so it is not the GPL hazard. retinue still
#     stays MPL-free by policy (it carries no Servo-derived code); MPL lives in genet, whose
#     stylo/Servo lineage makes it MPL by design. So MPL is excluded here as convention, not
#     because it is dangerous to combine.
#
# bzip2-1.0.6 is the permissive bzlib license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "bzip2-1.0.6",
]
confidence-threshold = 0.9
